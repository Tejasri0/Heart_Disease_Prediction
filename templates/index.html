<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>

    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        body {
            background: #f2f6fc;
            padding: 30px;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 700px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: darkred;
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
        }

        h3 {
            margin-top: 20px;
            color: blue;
            text-align: center;
        }

        h5 {
            text-align: center;
            color: gray;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Heart Disease Prediction System</h1>

    <form action="/predict" method="POST">

        <input type="number" class="form-control" name="age" placeholder="Age" required>

        <input type="number" class="form-control" name="sex" placeholder="Sex (0 = Female, 1 = Male)" required>

        <input type="number" class="form-control" name="cp" placeholder="Chest Pain Type (0-3)" required>

        <input type="number" class="form-control" name="trestbps" placeholder="Resting Blood Pressure" required>

        <input type="number" class="form-control" name="chol" placeholder="Cholesterol" required>

        <input type="number" class="form-control" name="fbs" placeholder="Fasting Blood Sugar (0 or 1)" required>

        <input type="number" class="form-control" name="restecg" placeholder="Resting ECG (0-2)" required>

        <input type="number" class="form-control" name="thalach" placeholder="Maximum Heart Rate" required>

        <input type="number" class="form-control" name="exang" placeholder="Exercise Induced Angina (0 or 1)" required>

        <input type="number" step="0.1" class="form-control" name="oldpeak" placeholder="Old Peak" required>

        <input type="number" class="form-control" name="slope" placeholder="Slope (0-2)" required>

        <input type="number" class="form-control" name="ca" placeholder="Number of Major Vessels (0-4)" required>

        <input type="number" class="form-control" name="thal" placeholder="Thal (0-3)" required>

        <button type="submit" class="btn btn-danger">
            Predict Heart Disease
        </button>

    </form>

    <h3>{{ prediction_text }}</h3>

    <hr>

    <h5>Machine Learning Classification Project</h5>
    <h5>Heart Disease Prediction using Flask</h5>

</div>

</body>

</html>
